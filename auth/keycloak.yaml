apiVersion: v1
kind: Namespace
metadata:
  name: keycloak

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak

spec:
  replicas: 1

  selector:
    matchLabels:
      app: keycloak

  template:
    metadata:
      labels:
        app: keycloak

    spec:
      containers:
      - name: keycloak

        image: quay.io/keycloak/keycloak:24.0.3

        args:
          - start-dev

        env:
        - name: KEYCLOAK_ADMIN
          value: admin

        - name: KEYCLOAK_ADMIN_PASSWORD
          value: admin123

        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: keycloak

spec:
  selector:
    app: keycloak

  ports:
  - port: 8080
    targetPort: 8080

  type: ClusterIP